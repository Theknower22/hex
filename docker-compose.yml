version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./hexa.db
      - SECRET_KEY=your_secret_key_here

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
